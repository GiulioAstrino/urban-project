<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | uSeed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-8 md:p-12 animate-fade-in">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <img src="images/logo.png" alt="uSeed Logo" class="h-12 w-auto bg-slate-100 rounded p-1">
                <span class="font-bold text-2xl tracking-wider uppercase text-slate-900">u<span class="text-growth-green">Seed</span></span>
            </a>
            <h2 class="text-3xl font-black text-slate-900 uppercase">Welcome</h2>
            <p class="text-gray-500 mt-2">Log in to participate in urban regeneration.</p>
        </div>

        <form id="auth-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 uppercase tracking-widest mb-2">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-growth-green outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 uppercase tracking-widest mb-2">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-growth-green outline-none transition-all">
            </div>
            <div id="auth-error" class="text-red-500 text-sm hidden"></div>
            <button type="submit" id="auth-btn" class="w-full btn-primary py-4 uppercase tracking-widest text-lg">Login</button>
        </form>

        <div class="mt-8 text-center border-t pt-8">
            <p class="text-gray-500 text-sm">Don't have an account? <a href="#" id="toggle-auth" class="text-growth-green font-bold hover:underline">Sign Up</a></p>
        </div>
        <div class="mt-4 text-center">
            <a href="index.html" class="text-gray-400 text-xs uppercase tracking-widest hover:text-slate-600 transition-colors">Back to Home</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjevwldzatcytulcfhpb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_GiqFOHnsA2QyXb3x6hoKJA_8GgtrYLr';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authBtn = document.getElementById('auth-btn');
        const toggleAuth = document.getElementById('toggle-auth');
        const errorDiv = document.getElementById('auth-error');

        let isLogin = true;

        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authBtn.innerText = isLogin ? 'Login' : 'Sign Up';
            toggleAuth.innerText = isLogin ? 'Sign Up' : 'Login';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            const email = emailInput.value;
            const password = passwordInput.value;

            let result;
            if (isLogin) {
                result = await supabaseClient.auth.signInWithPassword({ email, password });
            } else {
                result = await supabaseClient.auth.signUp({ email, password });
            }

            if (result.error) {
                errorDiv.innerText = result.error.message;
                errorDiv.classList.remove('hidden');
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
