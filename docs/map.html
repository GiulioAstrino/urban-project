<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map | uSeed</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'growth-green': '#2ecc71',
                        'slate-dark': '#1e293b',
                    }
                }
            }
        }
    </script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="antialiased h-screen flex flex-col" x-data="mapApp()">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 dark-glass-panel border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center gap-2 group">
                        <img src="images/logo.png" alt="uSeed Logo" class="h-10 w-auto transform group-hover:scale-110 transition-transform bg-white/90 rounded px-1 py-0.5">
                        <span class="font-bold text-2xl tracking-wider uppercase text-white hidden sm:block drop-shadow-md">u<span class="text-growth-green">Seed</span></span>
                    </a>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden sm:ml-6 sm:flex sm:items-center sm:space-x-8">
                    <a href="index.html" class="border-b-2 border-transparent text-gray-300 hover:border-gray-300 hover:text-white px-1 pt-1 text-sm font-medium transition-colors">Home</a>
                    <a href="map.html" class="border-b-2 border-growth-green text-white px-1 pt-1 text-sm font-medium">Map</a>
                    <a href="feed.html" class="border-b-2 border-transparent text-gray-300 hover:border-gray-300 hover:text-white px-1 pt-1 text-sm font-medium transition-colors">Proposals</a>
                    <a href="community.html" class="border-b-2 border-transparent text-gray-300 hover:border-gray-300 hover:text-white px-1 pt-1 text-sm font-medium transition-colors">Community</a>

                    <div class="flex items-center gap-4 ml-4 border-l border-slate-700 pl-6">
                        <template x-if="!user">
                            <div class="flex items-center gap-4">
                                <a href="login.html" class="text-sm font-medium text-gray-300 hover:text-white">Login</a>
                                <a href="login.html" class="btn-primary text-xs py-2 px-4">Sign Up</a>
                            </div>
                        </template>
                        <template x-if="user">
                            <div class="flex items-center gap-4">
                                <span class="text-xs text-gray-400 font-mono" x-text="user.email"></span>
                                <button @click="await supabaseClient.auth.signOut(); window.location.href = 'index.html'" class="text-sm font-medium text-red-400 hover:text-red-300">Logout</button>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- Mobile menu button -->
                <div class="hidden flex items-center">
                    <button @click="mobileMenuOpen = !mobileMenuOpen" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-slate-700 focus:outline-none">
                        <svg x-show="!mobileMenuOpen" class="block h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                        <svg x-show="mobileMenuOpen" class="block h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu Overlay -->
        <div x-show="mobileMenuOpen" class="sm:hidden dark-glass-panel absolute w-full border-b border-slate-700" style="display: none;">
            <div class="pt-2 pb-3 space-y-1 px-4">
                <a href="index.html" class="block py-2 text-white font-medium border-b border-slate-700">Home</a>
                <a href="map.html" class="block py-2 text-growth-green font-bold border-b border-slate-700">Map</a>
                <a href="feed.html" class="block py-2 text-gray-300 border-b border-slate-700">Proposals</a>
                <a href="community.html" class="block py-2 text-gray-300">Community</a>
            </div>
        </div>
    </nav>

    <!-- Mobile Bottom Navigation -->
    <div class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            Home
        </a>
        <a href="map.html" class="mobile-nav-item active">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
            Map
        </a>
        <a href="feed.html" class="mobile-nav-item">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v12a2 2 0 01-2 2z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 2v4a2 2 0 002 2h4" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12h10M7 16h10M9 8h2" /></svg>
            Seeds
        </a>
        <a href="community.html" class="mobile-nav-item">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
            Community
        </a>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Map Container -->
        <div id="map" class="absolute inset-0 md:relative md:h-full md:w-2/3 lg:w-3/4 z-0"></div>

        <!-- Sidebar / Modal Overaly -->
        <div :class="{'translate-y-full md:translate-y-0': !selectedSpot, 'translate-y-0': selectedSpot}" 
             class="fixed bottom-0 left-0 right-0 h-[70vh] md:h-full md:relative md:w-1/3 lg:w-1/4 bg-white shadow-[-4px_0_15px_rgba(0,0,0,0.1)] z-10 flex flex-col overflow-hidden transition-transform duration-300 ease-in-out rounded-t-3xl md:rounded-none">
            
            <!-- Mobile Handle -->
            <div class="md:hidden flex justify-center py-4 bg-white sticky top-0 z-30" @click="selectedSpot = null">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
            </div>
            
            <!-- Hot Spots List -->
            <div x-show="!selectedSpot" class="h-full flex flex-col p-6 overflow-y-auto animate-fade-in">
                <h2 class="text-2xl font-extrabold text-slate-800 mb-6 flex items-center gap-2">
                    <svg class="w-6 h-6 text-growth-green" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Discovery
                </h2>
                <p class="text-sm text-gray-500 mb-6">Click a marker on the map to start reclaiming spaces.</p>
                
                <div class="space-y-4" id="hotspot-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Details Panel -->
            <div x-show="selectedSpot" style="display: none;" class="h-full flex flex-col p-6 overflow-y-auto bg-slate-50 relative z-20">
                <button @click="selectedSpot = null" class="self-start mb-4 text-gray-500 hover:text-slate-800 flex items-center gap-1 transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Close
                </button>

                <div x-show="selectedSpot">
                    <div class="h-48 w-full bg-slate-200 rounded-lg mb-6 overflow-hidden relative">
                        <template x-if="selectedSpot?.image">
                            <img :src="selectedSpot?.image" alt="Location" class="w-full h-full object-cover">
                        </template>
                        <template x-if="!selectedSpot?.image">
                            <div class="w-full h-full flex items-center justify-center bg-slate-300 text-gray-500 font-bold uppercase tracking-widest text-sm">No Photo</div>
                        </template>
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                        <div class="absolute bottom-3 left-3 text-white text-xs font-bold uppercase tracking-wide bg-slate-900/50 px-2 py-1 rounded">
                            ID: <span x-text="selectedSpot?.id"></span>
                        </div>
                    </div>

                    <h3 class="text-2xl font-extrabold text-slate-800 mb-2" x-text="selectedSpot?.title"></h3>
                    <div class="flex items-center gap-2 mb-6">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800" x-text="selectedSpot?.zone"></span>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Abandoned</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                            <span class="block text-xs font-medium text-gray-500 uppercase">Square Footage</span>
                            <span class="block text-lg font-bold text-slate-800 mt-1" x-text="selectedSpot?.sqft + ' m²'"></span>
                        </div>
                        <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                            <span class="block text-xs font-medium text-gray-500 uppercase">Proposals</span>
                            <span class="block text-lg font-bold text-growth-green mt-1" x-text="selectedSpot?.proposals"></span>
                        </div>
                    </div>

                    <p class="text-gray-600 mb-8 leading-relaxed" x-text="selectedSpot?.desc"></p>

                    <template x-if="selectedSpot?.proposals > 0">
                        <a :href="'feed.html#seed-' + selectedSpot?.id" class="w-full btn-primary text-center block">
                            View Proposals
                        </a>
                    </template>
                    <template x-if="selectedSpot?.proposals === 0">
                        <a href="feed.html" class="w-full btn-primary text-center block bg-slate-800 hover:bg-slate-700 shadow-none">
                            Plant the first Seed!
                        </a>
                    </template>
                </div>
            </div>

        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://mjevwldzatcytulcfhpb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_GiqFOHnsA2QyXb3x6hoKJA_8GgtrYLr';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function mapApp() {
            return {
                mobileMenuOpen: false,
                user: null,
                selectedSpot: null,
                staticSpots: [
                    {
                        id: "piave-76",
                        title: "Via Piave 76",
                        zone: "Central District",
                        lat: 45.4880, 
                        lng: 12.2330,
                        sqft: "Varies",
                        proposals: 1,
                        desc: "Vacant commercial unit previously used for temporary civic initiatives. Perfect for community reactivation.",
                        image: "images/piave_76.png"
                    },
                    {
                        id: "piave-66",
                        title: "Via Piave 66",
                        zone: "Central District",
                        lat: 45.4890, 
                        lng: 12.2335,
                        sqft: "30",
                        proposals: 1,
                        desc: "Small commercial space. Strategic location for small-scale pilot projects.",
                        image: "images/piave_66.png"
                    },
                    {
                        id: "piave-38",
                        title: "Via Piave 38",
                        zone: "Central District",
                        lat: 45.4910, 
                        lng: 12.2345,
                        sqft: "500",
                        proposals: 1,
                        desc: "Large former commercial warehouse. Ambitious scale suitable for multi-use community projects.",
                        image: "images/piave_38.png"
                    },
                    {
                        id: "piave-24",
                        title: "Via Piave 24 (Former Bank)",
                        zone: "Central District",
                        lat: 45.4925, 
                        lng: 12.2355,
                        sqft: "180",
                        proposals: 1,
                        desc: "Corner commercial unit with high visibility. Vacant for over a year. Ideal for cultural hub.",
                        image: "images/piave_24.png"
                    }
                ],
                async init() {
                    const { data } = await supabaseClient.auth.getSession();
                    this.user = data.session?.user || null;
                    supabaseClient.auth.onAuthStateChange((_event, session) => { this.user = session?.user || null });

                    // Initialize Leaflet Map
                    const map = L.map('map', { zoomControl: false }).setView([45.485, 12.240], 14);
                    L.control.zoom({ position: 'bottomright' }).addTo(map);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

                    const customIcon = L.divIcon({ className: 'custom-leaflet-marker', iconSize: [24, 24], iconAnchor: [12, 12] });
                    const hotspotList = document.getElementById('hotspot-list');

                    // Fetch dynamic spots
                    const { data: dbSpots } = await supabaseClient.from('reports').select('*');
                    const allSpots = [...this.staticSpots];
                    if (dbSpots) {
                        dbSpots.forEach(s => {
                            allSpots.push({ id: s.id, title: s.address, zone: s.space_type, lat: s.lat, lng: s.lng, sqft: "TBD", proposals: 0, desc: s.description, image: "" });
                        });
                    }

                    allSpots.forEach(spot => {
                        const marker = L.marker([spot.lat, spot.lng], { icon: customIcon }).addTo(map);
                        marker.on('click', () => { this.selectedSpot = spot; map.setView([spot.lat, spot.lng], 16, { animate: true }); });

                        const listItem = document.createElement('div');
                        listItem.className = 'glass-panel p-4 rounded-lg cursor-pointer hover:border-growth-green transition-colors border border-gray-200';
                        listItem.innerHTML = `<h4 class="font-bold text-slate-800 text-lg">${spot.title}</h4><p class="text-sm text-gray-500 mt-1">${spot.zone}</p>`;
                        listItem.addEventListener('click', () => { this.selectedSpot = spot; map.setView([spot.lat, spot.lng], 16, { animate: true }); });
                        hotspotList.appendChild(listItem);
                    });
                }
            }
        }
    </script>
</body>
</html>
